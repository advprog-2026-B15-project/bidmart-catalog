version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bidmart_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MY_SECRET_DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: