version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: bidmart_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MY_SECRET_DB_PASS:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bidmart_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - DB_URL=jdbc:postgresql://db:5432/bidmart_catalog
      - DB_USERNAME=postgres
      - MY_SECRET_DB_PASS=${MY_SECRET_DB_PASS:-postgres}
      # Konfigurasi RabbitMQ (CloudAMQP Eksternal)
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SPRING_RABBITMQ_VHOST=${RABBITMQ_VHOST}
      - SPRING_RABBITMQ_SSL_ENABLED=${RABBITMQ_SSL_ENABLED:-true}
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
