# ── Database (H2 in-memory) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── RabbitMQ: dummy host agar auto-config tidak crash saat startup ────────────
# Bean ConnectionFactory tetap dibuat oleh Spring Boot, tapi di-override oleh
# @MockBean di ConsumerIntegrationTest sehingga tidak ada koneksi nyata.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ── File uploads (skip untuk test) ────────────────────────────────────────────
spring.servlet.multipart.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.id.ac.ui.cs.advprog.bidmartcatalog=DEBUG
