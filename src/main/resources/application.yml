spring:
  application:
    name: bidmartcatalog

feature:
  enable-bid-restriction: ${ENABLE_BID_RESTRICTION:true}

  config:
    import: optional:file:.env[.properties]
  # Konfigurasi Database menggunakan Environment Variables
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bidmart_catalog}
    username: ${DB_USERNAME:postgres}
    password: ${MY_SECRET_DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # Flyway yang akan mengurus pembuatan tabel
    show-sql: ${SHOW_SQL:true} # Bisa dimatikan di AWS nanti
    properties:
      hibernate:
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    validate-on-migrate: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}
    listener:
      simple:
        auto-startup: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
