<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Listing Baru - BidMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 flex items-center">
                <a th:href="@{/listings}" class="text-2xl font-bold text-blue-600 tracking-tight hover:text-blue-700 transition-colors">BidMart</a>
            </div>
            <div class="flex space-x-4">
                <a th:href="@{/listings}" class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                    Kembali ke Katalog
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">

        <div>
            <h2 class="text-center text-3xl font-extrabold text-gray-900">
                Buat Listing Lelang
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Lengkapi detail barang yang ingin Anda lelang.
            </p>
        </div>

        <form class="mt-8 space-y-6" th:action="@{/listings/create}" th:object="${listing}" method="POST" enctype="multipart/form-data">

            <input type="hidden" th:field="*{sellerId}" value="dummy-seller-id-123" />

            <div class="rounded-md shadow-sm space-y-4">

                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700">Judul Barang <span class="text-red-500">*</span></label>
                    <input id="title" th:field="*{title}" type="text" required
                           class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                           placeholder="Contoh: MacBook Pro M2 2023">
                </div>

                <div>
                    <label for="category" class="block text-sm font-medium text-gray-700">Kategori <span class="text-red-500">*</span></label>
                    <select id="category" name="category.id" required
                            class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border">
                        <option value="" disabled selected>Pilih Kategori</option>

                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                            Nama Kategori
                        </option>

                    </select>
                    <p class="mt-1 text-xs text-gray-500">Pilih kategori yang paling sesuai agar mudah dicari pembeli.</p>
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Deskripsi Barang</label>
                    <textarea id="description" th:field="*{description}" rows="4"
                              class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                              placeholder="Jelaskan kondisi barang, spesifikasi, dan minus (jika ada)..."></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="startingPrice" class="block text-sm font-medium text-gray-700">Harga Awal (Rp) <span class="text-red-500">*</span></label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="text-gray-500 sm:text-sm">Rp</span>
                            </div>
                            <input id="startingPrice" th:field="*{startingPrice}" type="number" min="0" required
                                   class="pl-10 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                                   placeholder="0">
                        </div>
                    </div>

                    <div>
                        <label for="reservePrice" class="block text-sm font-medium text-gray-700">Harga Cadangan (Opsional)</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="text-gray-500 sm:text-sm">Rp</span>
                            </div>
                            <input id="reservePrice" th:field="*{reservePrice}" type="number" min="0"
                                   class="pl-10 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                                   placeholder="0">
                        </div>
                        <p class="mt-1 text-xs text-gray-500">Lelang batal jika harga ini tidak tercapai.</p>
                    </div>
                </div>

                <div>
                    <label for="endTime" class="block text-sm font-medium text-gray-700">Waktu Lelang Berakhir <span class="text-red-500">*</span></label>
                    <input id="endTime" th:field="*{endTime}" type="datetime-local" required
                           class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm">
                </div>

            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Foto Barang (Bisa lebih dari 1) <span class="text-red-500">*</span></label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:border-blue-500 transition-colors bg-gray-50">
                    <div class="space-y-1 text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-600 justify-center">
                            <label for="imageFiles" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                                <span id="upload-text">Pilih file</span> <input id="imageFiles" name="imageFiles" type="file" class="sr-only" multiple accept="image/*" required>
                            </label>
                            <p class="pl-1 text-gray-500">atau drag and drop</p>
                        </div>
                        <p class="text-xs text-gray-500">PNG, JPG, GIF up to 5MB</p>
                    </div>
                </div>
                <div id="imagePreviewContainer" class="mt-4 grid grid-cols-3 sm:grid-cols-4 gap-4"></div>
            </div>

            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-200">
                <a th:href="@{/listings}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Batal
                </a>
                <button type="submit" class="group relative flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Simpan sebagai Draft
                </button>
            </div>
        </form>
    </div>
</main>

<script>
    const fileInput = document.getElementById('imageFiles');
    const previewContainer = document.getElementById('imagePreviewContainer');
    const uploadText = document.getElementById('upload-text');

    fileInput.addEventListener('change', function() {
        // Kosongkan wadah preview jika user memilih ulang file
        previewContainer.innerHTML = '';

        const files = this.files;

        if (files.length > 0) {
            // Ubah teks tombol menjadi jumlah file yang dipilih
            uploadText.textContent = files.length + ' gambar dipilih';

            // Looping setiap gambar dan buat elemen <img> untuk ditampilkan
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    // URL.createObjectURL membaca file dari RAM komputermu sementara
                    img.src = URL.createObjectURL(file);
                    img.className = 'h-24 w-24 object-cover rounded-md border border-gray-200 shadow-md';

                    previewContainer.appendChild(img);
                }
            });
        } else {
            uploadText.textContent = 'Pilih file';
        }
    });
</script>

</body>
</html>
