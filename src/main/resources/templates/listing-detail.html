<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${listing.title + ' - BidMart'}">Detail Barang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 flex items-center">
                <a th:href="@{/listings}" class="text-2xl font-bold text-blue-600 tracking-tight">BidMart</a>
            </div>
            <div class="flex space-x-4">
                <a th:href="@{/listings}" class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Kembali ke Katalog</a>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <div class="bg-white shadow-lg rounded-2xl overflow-hidden border border-gray-100">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-0">

            <div class="bg-gray-100 p-8 flex items-center justify-center border-r border-gray-100 min-h-[400px]">
                <img th:if="${!#lists.isEmpty(listing.images)}"
                     th:src="${listing.images[0].imageUrl}"
                     th:alt="${listing.title}"
                     class="max-w-full h-auto max-h-[500px] object-contain rounded-lg shadow-sm">

                <div th:unless="${!#lists.isEmpty(listing.images)}" class="text-gray-400 flex flex-col items-center">
                    <svg class="w-20 h-20 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p>Tidak ada gambar tersedia</p>
                </div>
            </div>

            <div class="p-8 md:p-12 flex flex-col">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-sm font-semibold text-blue-600 uppercase tracking-wider bg-blue-50 px-3 py-1 rounded-full" th:text="${listing.category != null ? listing.category.name : 'Tanpa Kategori'}">Kategori</span>

                    <span th:if="${listing.status.name() == 'ACTIVE'}" class="bg-green-100 text-green-800 text-xs font-bold px-3 py-1 rounded-full border border-green-200 uppercase">Aktif</span>
                    <span th:if="${listing.status.name() == 'DRAFT'}" class="bg-gray-100 text-gray-800 text-xs font-bold px-3 py-1 rounded-full border border-gray-200 uppercase">Draft</span>
                    <span th:if="${listing.status.name() == 'CLOSED'}" class="bg-red-100 text-red-800 text-xs font-bold px-3 py-1 rounded-full border border-red-200 uppercase">Ditutup</span>
                </div>

                <h1 class="text-3xl font-extrabold text-gray-900 mb-2" th:text="${listing.title}">Judul Barang</h1>

                <div class="flex items-center text-sm text-gray-500 mb-6 pb-6 border-b border-gray-100">
                    <span th:text="${'Penjual: ' + listing.sellerId}">ID Penjual</span>
                    <span class="mx-3">•</span>
                    <span th:text="${'Dibuat: ' + #temporals.format(listing.createdAt, 'dd MMM yyyy')}">Tanggal Dibuat</span>
                </div>

                <div class="mb-8">
                    <p class="text-sm text-gray-500 mb-1">Harga Saat Ini</p>
                    <p class="text-4xl font-black text-gray-900" th:text="${'Rp ' + #numbers.formatDecimal(listing.currentPrice, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
                    <div class="flex items-center mt-3 text-sm text-red-600 font-medium bg-red-50 p-3 rounded-lg w-fit">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span th:text="${'Lelang Berakhir: ' + #temporals.format(listing.endTime, 'dd MMM yyyy HH:mm')}">Waktu Berakhir</span>
                    </div>
                </div>

                <div class="mb-8 flex-grow">
                    <h3 class="text-lg font-bold text-gray-900 mb-3">Deskripsi Barang</h3>
                    <p class="text-gray-600 leading-relaxed whitespace-pre-line" th:text="${listing.description}">
                        Deskripsi barang akan muncul di sini.
                    </p>
                </div>

                <div class="mt-auto pt-6 border-t border-gray-100">
                    <button th:if="${listing.status.name() == 'ACTIVE'}" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-bold transition-colors shadow-lg shadow-blue-200 flex justify-center items-center">
                        Ajukan Penawaran (Bid)
                    </button>

                    <div th:if="${listing.status.name() == 'DRAFT'}" class="flex space-x-4">
                        <form th:action="@{/listings/{id}/publish(id=${listing.id})}" method="post" class="w-full">
                            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl text-lg font-bold transition-colors shadow-lg shadow-green-200">
                                Publikasikan Lelang Ini
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
