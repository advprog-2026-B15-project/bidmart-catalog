<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BidMart - Auction Catalog</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .no-data { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <h1>Katalog Lelang BidMart</h1>
    <hr>

    <table>
        <thead>
            <tr>
                <th>Nama Barang</th>
                <th>Deskripsi</th>
                <th>Harga Awal</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="listing : ${listings}">
                <td th:text="${listing.title}">Nama Barang</td>
                <td th:text="${listing.description}">Deskripsi</td>
                <td th:text="'Rp ' + ${listing.startPrice}">0.0</td>
            </tr>
            <tr th:if="${#lists.isEmpty(listings)}">
                <td colspan="3" class="no-data">Belum ada barang yang dilelang saat ini.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
