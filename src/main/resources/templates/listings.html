<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidMart - Lelang Real-time</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 flex items-center">
                <span class="text-2xl font-bold text-blue-600 tracking-tight">BidMart</span>
            </div>
            <div class="hidden sm:flex space-x-4">
                <form th:action="@{/listings}" method="get" class="flex space-x-2">
                    <div class="relative">
                        <input type="text" name="title" th:value="${param.title}" placeholder="Cari barang lelang..."
                               class="w-64 pl-4 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <select name="categoryId" class="border border-gray-300 rounded-lg text-sm px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">Semua Kategori</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${param.categoryId != null and param.categoryId[0] == cat.id.toString()}"></option>
                    </select>
                    <button type="submit" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        Cari
                    </button>
                </form>

                <a th:href="@{/listings/create}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors ml-4 flex items-center">
                    + Buat Listing
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Katalog Lelang</h1>
            <p class="text-gray-500 mt-1">Temukan dan tawar barang impianmu.</p>
        </div>
    </div>

    <div th:if="${message}" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded shadow-sm flex items-center">
        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
        <span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded shadow-sm flex items-center">
        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
        <span th:text="${error}"></span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div th:each="listing : ${listings}" class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow duration-300 border border-gray-100 overflow-hidden flex flex-col relative group">

            <div class="relative h-48 bg-gray-200 overflow-hidden">
                <img th:if="${!#lists.isEmpty(listing.images)}"
                     th:src="${listing.images[0].imageUrl}"
                     th:alt="${listing.title}"
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                <div th:unless="${!#lists.isEmpty(listing.images)}" class="w-full h-full flex items-center justify-center text-gray-400">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>

                <span th:if="${listing.status.name() == 'ACTIVE'}" class="absolute top-2 right-2 bg-green-500 text-white text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wide shadow">Aktif</span>
                <span th:if="${listing.status.name() == 'DRAFT'}" class="absolute top-2 right-2 bg-gray-500 text-white text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wide shadow">Draft</span>
                <span th:if="${listing.status.name() == 'CLOSED'}" class="absolute top-2 right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wide shadow">Ditutup</span>
            </div>

            <div class="p-4 flex flex-col flex-grow">
                <div class="flex justify-between items-start mb-1">
                    <p class="text-xs text-blue-600 font-semibold uppercase tracking-wider" th:text="${listing.category != null ? listing.category.name : 'Tanpa Kategori'}"></p>
                    <span th:if="${listing.bidCount > 0}" class="text-[10px] bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full font-medium" th:text="${listing.bidCount + ' Bid'}"></span>
                </div>

                <h3 class="text-lg font-bold text-gray-900 mb-2 line-clamp-2" th:text="${listing.title}">Judul Barang</h3>

                <div class="mt-auto pt-4">
                    <p class="text-sm text-gray-500 mb-1">Harga Saat Ini:</p>
                    <p class="text-xl font-extrabold text-gray-900" th:text="${'Rp ' + #numbers.formatDecimal(listing.currentPrice, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
                </div>

                <div class="mt-3 text-xs text-gray-500 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span th:text="${'Berakhir: ' + #temporals.format(listing.endTime, 'dd MMM yyyy HH:mm')}">Waktu Berakhir</span>
                </div>

                <div class="mt-4 flex space-x-2">
                    <a th:href="@{/listings/{id}(id=${listing.id})}" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 py-2 rounded-lg text-sm font-semibold transition-colors text-center inline-block">
                        Detail
                    </a>

                    <form th:if="${listing.status.name() == 'DRAFT'}"
                          th:action="@{/listings/{id}/publish(id=${listing.id})}" method="post" class="flex-1">
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg text-sm font-semibold transition-colors shadow-sm">
                            Aktifkan
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${totalPages > 0}" class="mt-10 flex justify-center">
        <nav class="flex items-center space-x-2 bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100">
            <a th:if="${currentPage > 0}"
               th:href="@{/listings(page=${currentPage - 1}, title=${param.title}, categoryId=${param.categoryId})}"
               class="px-3 py-2 rounded-md border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                Sebelumnya
            </a>

            <span class="px-4 py-2 text-sm text-gray-700">
                Halaman <span class="font-bold text-blue-600" th:text="${currentPage + 1}"></span> dari <span class="font-bold" th:text="${totalPages}"></span>
            </span>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/listings(page=${currentPage + 1}, title=${param.title}, categoryId=${param.categoryId})}"
               class="px-3 py-2 rounded-md border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                Selanjutnya
            </a>
        </nav>
    </div>

    <div th:if="${#lists.isEmpty(listings)}" class="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300 mt-8">
        <svg class="mx-auto h-16 w-16 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
        </svg>
        <h3 class="mt-4 text-lg font-medium text-gray-900">Tidak ada barang ditemukan</h3>
        <p class="mt-2 text-sm text-gray-500">Coba ubah kata kunci pencarian atau filter kategori Anda.</p>
        <a th:href="@{/listings}" class="mt-6 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700">
            Reset Pencarian
        </a>
    </div>

</main>

</body>
</html>
