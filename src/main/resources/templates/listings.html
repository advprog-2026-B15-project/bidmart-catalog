<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidMart - Lelang Real-time</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0 flex items-center">
                <span class="text-2xl font-bold text-blue-600 tracking-tight">BidMart</span>
            </div>
            <div class="hidden sm:flex space-x-4">
                <div class="relative">
                    <input type="text" placeholder="Cari barang lelang..."
                           class="w-64 pl-4 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <a th:href="@{/listings/create}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    + Buat Listing
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Katalog Lelang</h1>
            <p class="text-gray-500 mt-1">Temukan dan tawar barang impianmu.</p>
        </div>
    </div>

    <div th:if="${message}" class="mb-4 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded shadow-sm">
        <p th:text="${message}"></p>
    </div>
    <div th:if="${error}" class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded shadow-sm">
        <p th:text="${error}"></p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div th:each="listing : ${listings}" class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow duration-300 border border-gray-100 overflow-hidden flex flex-col">

            <div class="relative h-48 bg-gray-200">
                <img th:if="${!#lists.isEmpty(listing.images)}"
                     th:src="${listing.images[0].imageUrl}"
                     th:alt="${listing.title}"
                     class="w-full h-full object-cover">
                <div th:unless="${!#lists.isEmpty(listing.images)}" class="w-full h-full flex items-center justify-center text-gray-400">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>

                <span th:if="${listing.status.name() == 'ACTIVE'}" class="absolute top-2 right-2 bg-green-500 text-white text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wide">
                        Aktif
                    </span>
                <span th:if="${listing.status.name() == 'DRAFT'}" class="absolute top-2 right-2 bg-gray-500 text-white text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wide">
                        Draft
                    </span>
            </div>

            <div class="p-4 flex flex-col flex-grow">
                <p class="text-xs text-blue-600 font-semibold mb-1 uppercase tracking-wider" th:text="${listing.category != null ? listing.category.name : 'Tanpa Kategori'}"></p>
                <h3 class="text-lg font-bold text-gray-900 mb-2 line-clamp-2" th:text="${listing.title}">Judul Barang</h3>

                <div class="mt-auto pt-4">
                    <p class="text-sm text-gray-500 mb-1">Harga Saat Ini:</p>
                    <p class="text-xl font-extrabold text-gray-900" th:text="${'Rp ' + #numbers.formatDecimal(listing.currentPrice, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
                </div>

                <div class="mt-3 text-xs text-gray-500 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span th:text="${'Berakhir: ' + #temporals.format(listing.endTime, 'dd MMM yyyy HH:mm')}">Waktu Berakhir</span>
                </div>

                <div class="mt-4 flex space-x-2">
                    <button class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 py-2 rounded-lg text-sm font-semibold transition-colors">
                        Detail
                    </button>

                    <form th:if="${listing.status.name() == 'DRAFT'}"
                          th:action="@{/listings/{id}/publish(id=${listing.id})}"
                          method="post"
                          class="flex-1">
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg text-sm font-semibold transition-colors shadow-sm">
                            Aktifkan
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${totalPages > 0}" class="mt-10 flex justify-center">
        <nav class="flex items-center space-x-2">
            <a th:if="${currentPage > 0}"
               th:href="@{/listings(page=${currentPage - 1})}"
               class="px-3 py-2 rounded-md border border-gray-300 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                Sebelumnya
            </a>

            <span class="px-4 py-2 text-sm text-gray-700">
                    Halaman <span class="font-bold" th:text="${currentPage + 1}"></span> dari <span class="font-bold" th:text="${totalPages}"></span>
                </span>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/listings(page=${currentPage + 1})}"
               class="px-3 py-2 rounded-md border border-gray-300 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                Selanjutnya
            </a>
        </nav>
    </div>

    <div th:if="${#lists.isEmpty(listings)}" class="text-center py-16">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
        <h3 class="mt-2 text-sm font-medium text-gray-900">Belum ada listing</h3>
        <p class="mt-1 text-sm text-gray-500">Jadilah yang pertama membuat lelang di platform ini.</p>
    </div>

</main>

</body>
</html>
