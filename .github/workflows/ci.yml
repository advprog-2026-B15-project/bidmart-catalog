name: CI/CD - bidmartcatalog

on:
  push:
    branches: [ main ]

jobs:
  test-and-quality:
    name: Test and Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Run Tests first
      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport -Dspring.profiles.active=test --no-daemon

      # Run Quality Tools
      - name: Run PMD
        run: ./gradlew pmdMain pmdTest --no-daemon

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      - name: Run Dependency Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: true

      # Enforce Coverage (90%)
      - name: Check minimum coverage threshold
        run: |
          COVERAGE=$(python3 - << 'EOF'
          import xml.etree.ElementTree as ET, sys
          try:
              tree = ET.parse("build/reports/jacoco/test/jacocoTestReport.xml")
              root = tree.getroot()
              for counter in root.findall("./counter[@type='INSTRUCTION']"):
                  missed  = int(counter.get("missed", 0))
                  covered = int(counter.get("covered", 0))
                  total   = missed + covered
                  if total > 0:
                      pct = (covered / total) * 100
                      print(f"{pct:.1f}")
                      sys.exit(0)
          except Exception as e:
              print(f"Error parsing XML: {e}", file=sys.stderr)
          print("0")
          EOF
          )
          echo "Instruction coverage: ${COVERAGE}%"
          is_below=$(echo "$COVERAGE 90" | awk '{if ($1 < $2) print 1; else print 0}')
          if [ "$is_below" -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below the 90% threshold!"
            exit 1
          fi

  deploy:
    name: Deploy to EC2
    needs: test-and-quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:   ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Update known hosts
            mkdir -p ~/.ssh
            ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
            
            cd ~/bidmart-catalog
            git pull origin main
            docker compose up -d --build
            docker image prune -f
