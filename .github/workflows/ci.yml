name: CI/CD - bidmartcatalog

on:
  push:
    branches: [ main, staging, milestone100 ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-build:
    name: Test and Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Run Tests first
      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport -Dspring.profiles.active=test --no-daemon

      # Run Quality Tools
      - name: Run PMD
        run: ./gradlew pmdMain pmdTest --no-daemon

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      - name: Run Dependency Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: true # Non-blocking for now

      # Enforce Coverage (90%)
      - name: Check minimum coverage threshold
        run: |
          COVERAGE=$(python3 - << 'EOF'
          import xml.etree.ElementTree as ET, sys
          try:
              tree = ET.parse("build/reports/jacoco/test/jacocoTestReport.xml")
              root = tree.getroot()
              for counter in root.findall("./counter[@type='INSTRUCTION']"):
                  missed  = int(counter.get("missed", 0))
                  covered = int(counter.get("covered", 0))
                  total   = missed + covered
                  if total > 0:
                      pct = (covered / total) * 100
                      print(f"{pct:.1f}")
                      sys.exit(0)
          except Exception as e:
              print(f"Error parsing XML: {e}", file=sys.stderr)
          print("0")
          EOF
          )
          echo "Instruction coverage: ${COVERAGE}%"
          is_below=$(echo "$COVERAGE 90" | awk '{if ($1 < $2) print 1; else print 0}')
          if [ "$is_below" -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below the 90% threshold!"
            exit 1
          fi

      # Build and Push Docker Image (only if tests pass)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


  deploy:
    name: Deploy to EC2
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/milestone100' || github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Remove old host key and add new one to prevent verification issues
            ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
            
            # Login to registry on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Go to app directory
            cd ~/bidmart-catalog
            
            # Set Image Env and update
            export DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:milestone100
            docker compose pull app
            docker compose up -d
            
            # Clean up old images
            docker image prune -f
