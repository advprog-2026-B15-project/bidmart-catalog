name: CI/CD - bidmartcatalog

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test and Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build executable JAR (Heavy lifting done by GitHub)
      - name: Build with Gradle
        run: ./gradlew bootJar -Dspring.profiles.active=test --no-daemon

      # Run Tests
      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      # Run Quality Tools
      - name: Run PMD
        run: ./gradlew pmdMain pmdTest --no-daemon

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      # Enforce Coverage (90%)
      - name: Check minimum coverage threshold
        run: |
          COVERAGE=$(python3 - << 'EOF'
          import xml.etree.ElementTree as ET, sys
          try:
              tree = ET.parse("build/reports/jacoco/test/jacocoTestReport.xml")
              root = tree.getroot()
              for counter in root.findall("./counter[@type='INSTRUCTION']"):
                  missed  = int(counter.get("missed", 0))
                  covered = int(counter.get("covered", 0))
                  total   = missed + covered
                  if total > 0:
                      pct = (covered / total) * 100
                      print(f"{pct:.1f}")
                      sys.exit(0)
          except Exception as e:
              print(f"Error parsing XML: {e}", file=sys.stderr)
          print("0")
          EOF
          )
          echo "Instruction coverage: ${COVERAGE}%"
          is_below=$(echo "$COVERAGE 90" | awk '{if ($1 < $2) print 1; else print 0}')
          if [ "$is_below" -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below the 90% threshold!"
            exit 1
          fi

      # Upload Test Reports (JUnit & Jacoco)
      - name: Upload JUnit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: build/reports/tests/test/

      - name: Upload Jacoco Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/html/

      # Simpan artifact JAR untuk deployment
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    name: Deploy to EC2
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/bidmart-catalog
            git reset --hard origin/main
            git pull origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f

