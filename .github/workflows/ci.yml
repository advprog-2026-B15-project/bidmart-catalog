name: CI - bidmartcatalog

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Grant execute permission ──────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build (skip tests)
        run: ./gradlew build -x test --no-daemon

      # ── 5. Unit + Integration tests + JaCoCo report ──────────────────────────
      #    Profil "test" aktif agar H2 dan RabbitMQ-disable di-apply.
      - name: Run tests with coverage
        run: |
          ./gradlew test jacocoTestReport \
            -Dspring.profiles.active=test \
            --no-daemon
        env:
          RABBITMQ_HOST:     ${{ secrets.RABBITMQ_HOST     }}
          RABBITMQ_PORT:     ${{ secrets.RABBITMQ_PORT     }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}

      # ── 6. Publish JaCoCo XML ke GitHub (PR annotations) ────────────────────
      - name: Publish Coverage Report (JaCoCo)
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "📊 Coverage Report"
          update-comment: true

      # ── 7. Upload HTML coverage report sebagai artifact ──────────────────────
      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html-report
          path: build/reports/jacoco/test/html/
          retention-days: 14

      # ── 8. Upload test results ───────────────────────────────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/
          retention-days: 14

      # ── 9. Enforce minimum coverage (fail build jika < 70%) ─────────────────
      - name: Check minimum coverage threshold
        run: |
          COVERAGE=$(python3 - << 'EOF'
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse("build/reports/jacoco/test/jacocoTestReport.xml")
          root = tree.getroot()
          for counter in root.findall(".//counter[@type='INSTRUCTION']"):
              missed  = int(counter.get("missed", 0))
              covered = int(counter.get("covered", 0))
              total   = missed + covered
              if total > 0:
                  pct = covered / total * 100
                  print(f"{pct:.1f}")
                  sys.exit(0)
          print("0")
          EOF
          )
          echo "Instruction coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the 70% threshold!"
            exit 1
          fi
          echo "✅ Coverage threshold passed."

  # ── Code-quality (optional, non-blocking untuk saat ini) ─────────────────────
  static-analysis:
    name: Static Analysis (PMD)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - run: chmod +x gradlew
      - name: Run PMD
        run: ./gradlew pmdMain --no-daemon || true   # non-blocking
      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: build/reports/pmd/
          retention-days: 7